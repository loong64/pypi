name: build (orjson)

on:
  workflow_dispatch:
    inputs:
      version:
        default: 'latest'
        description: 'Package version'
        type: string
        required: true
  schedule:
    - cron: '0 17 * * *'

env:
  FORCE_COLOR: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  RUST_TOOLCHAIN: "nightly-2025-10-21"
  RUST_TOOLCHAIN_STABLE: "1.85"
  UNSAFE_PYO3_BUILD_FREE_THREADED: "1"
  UNSAFE_PYO3_SKIP_VERSION_CHECK: "1"
  UV_LINK_MODE: "copy"

jobs:
  manylinux_cross:
    name: "manylinux_${{ matrix.target.arch }}_${{ matrix.python.interpreter }}"
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        python: [
          { interpreter: 'python3.14', abi: 'cp314-cp314', manylinux: 'manylinux_2_36', maturin-version: 'v1.11.5', publish: true },
          { interpreter: 'python3.13', abi: 'cp313-cp313', manylinux: 'manylinux_2_36', maturin-version: 'v1.12.6', publish: true },
          { interpreter: 'python3.12', abi: 'cp312-cp312', manylinux: 'manylinux_2_36', maturin-version: 'v1.12.6', publish: true },
          { interpreter: 'python3.11', abi: 'cp311-cp311', manylinux: 'manylinux_2_36', maturin-version: 'v1.12.6', publish: true },
          { interpreter: 'python3.10', abi: 'cp310-cp310', manylinux: 'manylinux_2_36', maturin-version: 'v1.12.6', publish: true },
        ]
        target: [
          {
            arch: 'loongarch64',
            cflags: '-Os -fstrict-aliasing',
            features: 'generic_simd,no_panic',
            image: 'ghcr.io/rust-cross/manylinux_2_36-cross:loongarch64',
            runner: "ubuntu-24.04",
            rustflags: '-Z unstable-options -C panic=immediate-abort -Z mir-opt-level=4 -D warnings',
            target: 'loongarch64-unknown-linux-gnu',
          },
        ]
    steps:
      - name: Get Source Code
        run: |
          package=orjson
          if [ "${{ github.event_name }}" = "schedule" ]; then
            version="latest"
          else
            version=${{ github.event.inputs.version }}
          fi
          if [ "$version" = "latest" ]; then
            version=$(curl -sSL "https://pypi.org/pypi/${package}/json" | jq -r '.info.version')
          fi
          echo "Building package: ${package} version: ${version}"

          check_file="${package}-${version}-${{ matrix.python.abi }}-${{ matrix.python.manylinux }}_loongarch64.whl"
          if curl "https://gitlab.com/api/v4/projects/65746188/packages/pypi/simple/${package/./-}" | grep -oP '(?<=>)[^<]+\.whl' | grep -q "${check_file}"; then
            echo "Package ${package} ${version} already exists"
            echo "BUILD=false" >> $GITHUB_ENV
            exit 0
          fi

          echo "VERSION=${version}" >> $GITHUB_ENV

      - name: Checkout
        if: env.BUILD != 'false'
        uses: actions/checkout@v6
        with:
          repository: ijl/orjson
          ref: ${{ env.VERSION }}

      - name: build-std
        if: env.BUILD != 'false'
        run: |
          mkdir .cargo
          cp ci/config.toml .cargo/config.toml

      - name: Build
        if: env.BUILD != 'false'
        uses: PyO3/maturin-action@v1
        env:
          PYO3_CROSS_LIB_DIR: "/opt/python/${{ matrix.python.abi }}"
          CFLAGS: "${{ matrix.target.cflags }}"
          LDFLAGS: "-Wl,--as-needed"
          RUSTFLAGS: "${{ matrix.target.rustflags }}"
        with:
          args: --release --strip --out=dist --features=${{ matrix.target.features }} -i ${{ matrix.python.interpreter }}
          container: "${{ matrix.target.image }}"
          manylinux: "${{ matrix.python.manylinux }}"
          maturin-version: "${{ matrix.python.maturin-version }}"
          rust-toolchain: "${{ env.RUST_TOOLCHAIN }}"
          rustup-components: rust-src
          target: "${{ matrix.target.target }}"

      - name: Check wheel
        run: |
          ls -al dist/*.whl || exit 0
          echo "upload=true" >> $GITHUB_ENV

      - name: Upload wheels
        if: env.upload == 'true'
        run: |
          pip install twine==6.0.1
          for file in dist/*.whl; do
            twine upload --repository-url https://gitlab.com/api/v4/projects/65746188/packages/pypi $file || true
          done
        env:
          TWINE_USERNAME: ${{ github.repository_owner }}
          TWINE_PASSWORD: ${{ secrets.GL_TOKEN }}
