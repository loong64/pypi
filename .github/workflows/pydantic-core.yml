name: build (pydantic-core)

on:
  workflow_dispatch:
    inputs:
      version:
        default: 'latest'
        description: 'Package version'
        type: string
        required: true
      tag:
        default: 'main'
        description: 'Git tag or branch to build from'
        type: string
        required: true
  schedule:
    - cron: '0 17 * * *'

jobs:
  linux-cross:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        platform:
          - target: loongarch64-unknown-linux-gnu
            arch: loongarch64
            manylinux: 'manylinux_2_36'
          - target: loongarch64-unknown-linux-musl
            arch: loongarch64
            manylinux: "musllinux_1_2"
    steps:
      - name: Get Source Code
        run: |
          package=pydantic-core
          if [ "${{ github.event_name }}" = "schedule" ]; then
            version="latest"
            tag="main"
          else
            version=${{ github.event.inputs.version }}
            tag=${{ github.event.inputs.tag }}
          fi
          if [ "$version" = "latest" ]; then
            version=$(curl -sSL "https://pypi.org/pypi/${package}/json" | jq -r '.info.version')
          fi
          echo "Building package: ${package} version: ${version}"

          check_file="pydantic_core-${version}-.*-${{ matrix.platform.manylinux }}_${{ matrix.platform.arch }}.whl"
          if curl "https://gitlab.com/api/v4/projects/65746188/packages/pypi/simple/${package//./-}" | grep -oP '(?<=>)[^<]+\.whl' | grep -q "${check_file}"; then
            echo "Package ${package} ${version} already exists"
            echo "BUILD=false" >> $GITHUB_ENV
            exit 0
          fi

          echo "VERSION=${version}" >> $GITHUB_ENV
          echo "TAG=${tag}" >> $GITHUB_ENV

      - name: Checkout
        if: env.BUILD != 'false'
        uses: actions/checkout@v6
        with:
          repository: pydantic/pydantic
          ref: ${{ env.TAG }}

      - name: Patch build
        if: env.BUILD != 'false'
        run: |
          if ! grep -q '^version = "${{ env.VERSION }}"' pydantic-core/Cargo.toml; then
            exit 1
          fi

      - name: Build wheels
        if: env.BUILD != 'false'
        uses: PyO3/maturin-action@v1
        with:
          working-directory: pydantic-core
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          args: --release --out dist --interpreter 3.9 3.10 3.11 3.12 3.13 3.14 3.14t
          rust-toolchain: stable
          docker-options: -e CI
      
      - name: Check wheel
        run: |
          ls -al pydantic-core/dist/*.whl || exit 0
          echo "upload=true" >> $GITHUB_ENV

      - name: Upload wheels
        if: env.upload == 'true'
        run: |
          pip install twine==6.0.1
          for file in pydantic-core/dist/*.whl; do
            twine upload --repository-url https://gitlab.com/api/v4/projects/65746188/packages/pypi $file || true
          done
        env:
          TWINE_USERNAME: ${{ github.repository_owner }}
          TWINE_PASSWORD: ${{ secrets.GL_TOKEN }}
